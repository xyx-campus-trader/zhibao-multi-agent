version: "3.8"
services:
  app:
    build: .
    container_name: zhibao-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: zhibao-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zhibao-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: zhibao-postgres
    environment:
      POSTGRES_DB: zhibao
      POSTGRES_PASSWORD: zhibao123
    ports:
      - "5432:5432"
    restart: unless-stopped
